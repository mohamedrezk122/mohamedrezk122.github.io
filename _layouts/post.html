---
layout: default
---
<h1>
  {{ page.title }}
</h1>

<div class="post-date-page">
<h5> {{ page.author }} | {{ page.date | date_to_string }} </h5>
</div>

{%- if page.keywords -%}
<div class="post-keywords">
<h4> {{ page.keywords }} </h4>
</div>
{%- endif -%}

{%- if site.show_excerpts -%}
      {{ post.excerpt }}
{%- endif -%}
{% if page.image %}
<div style="text-align:center">
<img src="{{ site.github.url }}/assets/posts-covers/{{ page.image }}">
</div>
{% endif %}
<article>
  {{ content }}
</article>
